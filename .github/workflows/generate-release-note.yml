name: Generate Sprint Release Note

on:
  workflow_dispatch:

jobs:
  generate-release-note:
    runs-on: ubuntu-latest
    permissions:
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch sprint milestone issues
        id: fetch_sprint_issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
            });

            const sprintIssues = issues
              .filter(issue => issue.milestone?.title === 'sprint')
              .map(issue => ({
                number: issue.number,
                title: issue.title,
                body: issue.body || '',
                state: issue.state,
                url: issue.html_url,
                labels: issue.labels.map(label => label.name || ''),
              }));

            return JSON.stringify(sprintIssues);

      - name: Save sprint issues data
        run: |
          mkdir -p .github/release-notes
          python3 - <<'PY'
          import json, os
          issues = json.loads(os.environ['SPRINT_ISSUES'])
          if isinstance(issues, str):
              issues = json.loads(issues)
          with open('.github/release-notes/sprint-issues.json', 'w', encoding='utf-8') as f:
              json.dump(issues, f, indent=2)
          PY
        env:
          SPRINT_ISSUES: ${{ steps.fetch_sprint_issues.outputs.result }}

      - name: Draft release note
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          issues_path = Path('.github/release-notes/sprint-issues.json')
          release_path = Path('.github/release-notes/sprint-release-note.md')
          if not issues_path.exists():
              raise SystemExit('Sprint issues file not found')

          issues = json.loads(issues_path.read_text(encoding='utf-8'))
          if isinstance(issues, str):
              issues = json.loads(issues)
          lines = [
              '# Sprint Release Notes',
              '',
          ]

          if issues:
              lines.extend([
                  '## What changed',
                  '',
              ])
              for issue in issues:
                  lines.append(f"- **{issue['title']}** ({issue['url']})")
              lines.extend([
                  '',
                  '## Benefit',
                  '',
                  'This release note summarizes the sprint milestone issues and highlights how the current work improves clarity, planning, and execution.',
                  '',
                  '## Impact',
                  '',
                  'The sprint issues define the current development focus. Their completion helps reduce project risk, improves team alignment, and advances the current product sprint.',
              ])
          else:
              lines.extend([
                  'No sprint milestone issues were found for this release note.',
                  '',
                  'If issues exist on the project board under milestone `sprint`, confirm the repository and milestone naming and rerun the workflow.',
              ])

          release_path.write_text('\n'.join(lines), encoding='utf-8')
          print(f'Wrote release note to {release_path}')
          PY

      - name: Upload release note artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprint-release-note
          path: .github/release-notes/sprint-release-note.md
